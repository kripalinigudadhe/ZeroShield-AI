<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeroShield AI - Firewall Demo</title>
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js for statistics -->
  
<script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* body {
      font-family: 'DM Sans', Arial, sans-serif;
      margin:0; padding:0;
      background: #f7f9fa;
    }
    header {
      width:100%; background:#1f2b3a; color:white; padding:1rem 2rem;
      display:flex; justify-content:space-between; align-items:center;
    } */
    .logo { font-size:1.5rem; font-weight:bold; }
    nav ul { list-style:none; display:flex; gap:1rem; }
    nav ul li a { color:white; text-decoration:none; padding:0.3rem 0.5rem; border-radius:4px; }
    nav ul li a:hover { background:#0097b2; }
    main { padding:2rem; }
    h2 { color:#1f2b3a; text-align:center; margin-bottom:1.5rem; }
    .traffic-table { width:100%; border-collapse: collapse; margin-top:1rem; }
    .traffic-table th, .traffic-table td { border:1px solid #ccc; padding:0.5rem; text-align:center; }
    .traffic-table th { background:#0097b2; color:white; }
    .safe { background:#d4edda; color:#155724; }
    .malicious { background:#f8d7da; color:#721c24; }
    .btn { padding:0.5rem 1rem; margin:0.5rem; border:none; border-radius:5px; cursor:pointer; font-weight:600; }
    .btn-scan { background:#0097b2; color:white; }
    .btn-clear { background:#555; color:white; }
    .stats { display:flex; gap:2rem; margin-top:2rem; justify-content:center; }
    .stat-box { background:white; padding:1rem 2rem; border-radius:12px; box-shadow:0 2px 12px #0002; text-align:center; flex:1; min-width:150px; }
    canvas { max-width:100%; margin-top:2rem; }
  </style>
</head>
<body>
   <header>
    <nav class="navbar">
      <div class="logo">ZeroShield AI<span style="font-size:1.8rem;">🛡️</span></div>
   <ul class="nav-links">
               <li><a href="Home.html">Home</a></li>
                <li><a href="Dashboard.html">Dashboard</a></li>
                <li><a href="Architecture.html">Architecture</a></li>
                <li><a href="Comparison.html">Comparison</a></li>
                <li><a href="Pricing.html">Pricing</a></li>
                <li><a href="Docs.html">Docs</a></li>
                 <li><a href="About.html">About</a></li>
            </ul>

    </nav>
  </header>
  <main>
    <h2>Firewall Live Traffic Demo</h2>

    <div style="text-align:center;">
      <button class="btn btn-scan" onclick="scanPacket()">Scan Packet</button>
      <button class="btn btn-clear" onclick="clearTable()">Clear Table</button>
    </div>

    <table class="traffic-table" id="trafficTable">
      <thead>
        <tr>
          <th>Packet ID</th>
          <th>Size (bytes)</th>
          <th>Protocol</th>
          <th>Source Risk</th>
          <th>Destination Risk</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- Dynamic rows will appear here -->
      </tbody>
    </table>

    <div class="stats">
      <div class="stat-box">
        <h3 id="totalPackets">0</h3>
        <p>Total Packets Scanned</p>
      </div>
      <div class="stat-box">
        <h3 id="safePackets">0</h3>
        <p>Safe Packets</p>
      </div>
      <div class="stat-box">
        <h3 id="maliciousPackets">0</h3>
        <p>Malicious Packets</p>
      </div>
    </div>

    <canvas id="packetChart"></canvas>
  </main>

  <script>
    let packetCount = 0;
    let safeCount = 0;
    let maliciousCount = 0;
    const trafficTable = document.getElementById('trafficTable').getElementsByTagName('tbody')[0];

    function randomPacket() {
      return {
        id: packetCount + 1,
        size: Math.floor(Math.random() * 1500) + 50,
        protocol: ['HTTP','HTTPS','FTP','SSH'][Math.floor(Math.random()*4)],
        src_risk: Math.floor(Math.random()*11),
        dst_risk: Math.floor(Math.random()*11),
      };
    }

    function scanPacket() {
      const packet = randomPacket();
      packet.status = (packet.size>1200 || packet.src_risk>7 || packet.dst_risk>7) ? 'Malicious' : 'Safe';

      const row = trafficTable.insertRow();
      row.innerHTML = `<td>${packet.id}</td>
                       <td>${packet.size}</td>
                       <td>${packet.protocol}</td>
                       <td>${packet.src_risk}</td>
                       <td>${packet.dst_risk}</td>
                       <td class="${packet.status.toLowerCase()}">${packet.status}</td>`;

      packetCount++;
      if(packet.status==='Safe') safeCount++; else maliciousCount++;
      updateStats();
      updateChart();
    }

    function clearTable() {
      trafficTable.innerHTML = '';
      packetCount = 0; safeCount=0; maliciousCount=0;
      updateStats();
      updateChart();
    }

    function updateStats() {
      document.getElementById('totalPackets').innerText = packetCount;
      document.getElementById('safePackets').innerText = safeCount;
      document.getElementById('maliciousPackets').innerText = maliciousCount;
    }

    // Chart.js
    const ctx = document.getElementById('packetChart').getContext('2d');
    const packetChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Safe', 'Malicious'],
        datasets: [{
          label: 'Packet Status',
          data: [safeCount, maliciousCount],
          backgroundColor: ['#d4edda','#f8d7da'],
          borderColor: ['#155724','#721c24'],
          borderWidth: 1
        }]
      },
      options: {
        responsive:true,
        plugins: { legend: { position: 'bottom' } }
      }
    });

    function updateChart() {
      packetChart.data.datasets[0].data = [safeCount, maliciousCount];
      packetChart.update();
    }
  </script>
</body>
</html>
