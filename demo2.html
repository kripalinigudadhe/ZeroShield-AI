<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroShield AI Flow Diagram</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #ffffff;
        margin: 0;
        padding: 40px;
        text-align: center;
    }
    h1 {
        margin-bottom: 40px;
        color: #1f2b3a;
        font-size: 2.2em;
    }
    .flow {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
    }
    .step {
        text-align: center;
        width: 200px;
    }
    .arrow {
        width: 180px;
        height: 70px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        clip-path: polygon(0 0, 80% 0, 100% 50%, 80% 100%, 0 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 1.3em;
        margin: 0 auto 12px auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .text {
        font-size: 1em;
        font-weight: 600;
        color: #1f2b3a;
        line-height: 1.3em;
    }
    .target {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: radial-gradient(circle, #00c6ff 40%, #0072ff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: -10px;
        margin-left: 10px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }
    .target-inner {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: white;
        border: 6px solid #0072ff;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #0072ff;
        font-weight: bold;
        font-size: 0.95em;
        text-align: center;
        padding: 8px;
        line-height: 1.2em;
    }
</style>
</head>
<body>

<h1>ZeroShield AI – Next Gen Firewall Flow</h1>

<div class="flow">
    <div class="step">
        <div class="arrow">01</div>
        <div class="text">Network & Identity<br>Data Ingestion</div>
    </div>
    <div class="step">
        <div class="arrow">02</div>
        <div class="text">AI-Powered<br>Traffic Analysis</div>
    </div>
    <div class="step">
        <div class="arrow">03</div>
        <div class="text">Zero Trust &<br>Blockchain</div>
    </div>
    <div class="step">
        <div class="arrow">04</div>
        <div class="text">Automated Defense<br>& Analytics</div>
    </div>
    <div class="target">
        <div class="target-inner">Secure<br>ZeroShield AI</div>
    </div>
</div>

</body>
</html>
